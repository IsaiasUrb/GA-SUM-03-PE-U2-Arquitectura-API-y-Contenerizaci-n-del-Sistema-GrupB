services:
  postgres:
    image: postgres:16
    container_name: ga_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: gestion_laboratorios

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestion_laboratorios"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: