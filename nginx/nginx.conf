events {
    worker_connections 1024;
}

http {
    # Registro visible mediante docker logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # LÃ­mite general: 10 solicitudes por segundo por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # LÃ­mite mÃ¡s estricto para autenticaciÃ³n
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    upstream auth_service {
        server auth-service:8001;
    }

    upstream resource_service {
        server resource-service:3001;
    }

    upstream notification_service {
        server notification-service:3002;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10m;

        # VerificaciÃ³n rÃ¡pida de Nginx
        location = /health {
            default_type application/json;
            return 200 '{"status":"success","message":"Nginx funcionando"}';
        }

        # Auth-service
        location /auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://auth_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Resource-service
        location /resources {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://resource_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Notification-service
        location /notifications {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://notification_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            default_type application/json;
            return 404 '{"status":"error","message":"Ruta no encontrada"}';
        }
    }
}